<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI知识小测验 2026-03-18</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: white; }
        h1 { text-align: center; color: #667eea; font-size: 2em; margin-bottom: 10px; }
        .nav { text-align: center; margin-bottom: 15px; }
        .nav a { color: #667eea; text-decoration: none; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        .quiz-container { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .question-num { color: #ff9800; font-weight: bold; margin-bottom: 10px; }
        .question { font-size: 1.1em; margin-bottom: 15px; line-height: 1.6; }
        .options label { display: block; padding: 12px 15px; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 10px; cursor: pointer; }
        .options input { margin-right: 10px; }
        .btn { display: block; width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 1.1em; cursor: pointer; margin-top: 20px; }
        .result { display: none; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; margin-top: 30px; text-align: center; }
        .score { font-size: 3em; color: #ff9800; margin-bottom: 20px; }
        .analysis { display: none; margin-top: 30px; }
        .analysis-item { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .correct { color: #4caf50; }
        .wrong { color: #f44336; }
    </style>
</head>
<body>
    <div class="nav"><a href="/archive.html">← 返回专栏</a></div>
    <h1>🧠 AI知识小测验</h1>
    <p class="subtitle">2026-03-18 · 10道题测测你对AI的了解</p>
    <div id="quiz">
        <div class="quiz-container" id="q-container"></div>
        <button class="btn" onclick="submitQuiz()">提交答案</button>
    </div>
    <div class="result" id="result">
        <div class="score" id="score"></div>
        <p id="score-text"></p>
        <button class="btn" onclick="showAnalysis()">查看解析</button>
    </div>
    <div class="analysis" id="analysis"></div>
    <script>
    const questions = [{"question": "以下关于Transformer架构的描述，哪个是正确的？", "options": ["A. Transformer使用循环神经网络(RNN)来处理序列数据", "B. Transformer完全依赖注意力机制(Attention)来捕捉序列中的依赖关系", "C. Transformer只能处理自然语言，不能处理图像", "D. Transformer不需要任何训练就可以完成任务"], "answer": "B", "explanation": "Transformer架构完全基于注意力机制(Attention Mechanism)，通过自注意力(Self-Attention)来捕捉序列中不同位置之间的依赖关系，不再使用传统的RNN或CNN结构。这使得Transformer能够并行处理序列中的所有位置，大大提高了训练效率。"}, {"question": "GPT模型中的'T'代表什么含义？", "options": ["A. Token（标记）", "B. Transformer（变换器）", "C. Training（训练）", "D. Text（文本）"], "answer": "B", "explanation": "GPT是Generative Pre-trained Transformer的缩写。GPT系列模型采用了Transformer的解码器(Decoder)架构，经过大规模文本数据的预训练后，可以进行各种自然语言处理任务。'T'代表Transformer，这是GPT模型的核心架构基础。"}, {"question": "以下哪项不是OpenAI推出的产品或模型？", "options": ["A. GPT-4", "B. Claude", "C. DALL-E", "D. Whisper"], "answer": "B", "explanation": "Claude是Anthropic公司开发的大型语言模型，而不是OpenAI的产品。GPT-4、DALL-E（图像生成模型）、Whisper（语音识别模型）都是OpenAI推出的产品。Anthropic由前OpenAI研究人员创立，其核心产品是Claude系列模型。"}, {"question": "在大型语言模型训练中，'预训练'(Pre-training)的主要目的是什么？", "options": ["A. 让模型学习特定任务的解决方法", "B. 让模型学习大规模通用知识", "C. 减少模型的参数数量", "D. 加快模型的推理速度"], "answer": "B", "explanation": "预训练是大型语言模型训练的第一阶段，模型在大规模文本数据上学习通用的语言知识、语义理解、世界知识等。预训练后的模型具有强大的语言理解和生成能力，之后可以通过微调(Fine-tuning)来适应特定任务。这种两阶段训练范式是现代LLM成功的关键。"}, {"question": "以下哪种技术可以减少LLM生成过程中的随机性，使输出更确定？", "options": ["A. 增加Temperature参数", "B. 降低Temperature参数至接近0", "C. 使用更长的上下文窗口", "D. 增加Beam Search的宽度"], "answer": "B", "explanation": "Temperature参数控制生成文本的随机性。Temperature越高，模型越倾向于选择概率较低的词，输出更随机多样；Temperature越低（接近0），模型越倾向于选择概率最高的词，输出更确定性、更保守。设置temperature=0或很小的值可以获得更稳定、可预测的输出。"}, {"question": "Anthropic公司开发的Claude模型强调的核心设计原则是什么？", "options": ["A. 追求最大模型规模和算力", "B. 强调模型的安全性和有用性", "C. 专注于代码生成任务", "D. 只支持英文语言"], "answer": "B", "explanation": "Anthropic在开发Claude时，特别强调AI安全性和对齐(Alignment)原则。Claude的设计理念是成为有用(helpful)、诚实(honest)、无害(harmless)的AI助手。公司在AI安全研究方面投入大量资源，采用了Constitutional AI等技术来确保模型行为符合人类价值观。"}, {"question": "Transformer模型中的'Multi-Head Attention'（多头注意力）的主要作用是什么？", "options": ["A. 同时关注不同位置的信息", "B. 让模型同时学习多种语言", "C. 减少模型参数量", "D. 加快推理速度"], "answer": "A", "explanation": "多头注意力机制让模型能够在不同的注意力头(Head)中学习到不同的注意力模式，每个头可以关注序列的不同方面，比如语法结构、语义关系、位置信息等。通过并行运行多个注意力头，模型可以同时捕捉多种类型的信息，提升表示学习能力。"}, {"question": "以下哪项是LLM中'上下文窗口'(Context Window)的含义？", "options": ["A. 模型训练时使用的批量大小", "B. 模型一次可以处理的最大token数量", "C. 模型隐藏层的层数", "D. 模型参数的总数量"], "answer": "B", "explanation": "上下文窗口指的是大型语言模型在一次推理（或对话）中能够处理的最大token数量。这个限制包括输入和输出的总token数。不同的模型有不同的上下文窗口大小，如GPT-4 Turbo支持128K tokens，Claude 3支持200K tokens等。更大的上下文窗口允许模型处理更长的文档和进行更长时间的对话。"}, {"question": "在深度学习中，'过拟合'(Overfitting)指的是什么？", "options": ["A. 模型在训练数据上表现不好", "B. 模型在测试数据上表现比训练数据差很多", "C. 模型参数太少导致无法学习", "D. 模型训练时间太长"], "answer": "B", "explanation": "过拟合是指模型在训练数据上学得过于精确，以至于学习了训练数据中的噪声和细节，导致泛化能力下降。表现为训练误差很低但验证/测试误差很高。缓解过拟合的方法包括：增加数据量、使用正则化(L1/L2)、Dropout、早停(Early Stopping)等技术。"}, {"question": "以下哪种AI应用场景最适合使用检索增强生成(RAG)技术？", "options": ["A. 写一首诗", "B. 回答关于企业内部文档的具体问题", "C. 生成随机数", "D. 图像风格迁移"], "answer": "B", "explanation": "RAG(Retrieval-Augmented Generation)结合了信息检索和文本生成，特别适合需要准确引用私有或特定领域知识的场景。通过RAG，模型可以先从企业文档、知识库等来源检索相关信息，然后基于检索结果生成答案。这使得LLM能够回答关于企业内部文档、产品手册等具体问题，同时减少幻觉(Hallucination)问题。"}];
    
    function renderQuiz() {
        const c = document.getElementById('q-container');
        c.innerHTML = questions.map((q, i) => `<div class="question-num">第${i+1}题</div><div class="question">${q.question}</div><div class="options">${q.options.map((o, j) => `<label><input type="radio" name="q${i}" value="${String.fromCharCode(65+j)}">${o}</label>`).join('')}</div>`).join('');
    }
    
    function submitQuiz() {
        let s = 0, ans = [];
        questions.forEach((q, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            const u = sel ? sel.value : null;
            if (u === q.answer) { s++; ans.push({i, correct:true, u, a:q.answer}); }
            else { ans.push({i, correct:false, u, a:q.answer}); }
        });
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('score').textContent = `${s}/10`;
        document.getElementById('score-text').textContent = s>=7 ? '太棒了！' : s>=5 ? '不错哦！' : '继续加油！';
        window.ans = ans;
    }
    
    function showAnalysis() {
        const c = document.getElementById('analysis');
        c.style.display = 'block';
        c.innerHTML = '<h2>📝 答案解析</h2>' + window.ans.map(a => `<div class="analysis-item"><div class="${a.correct?'correct':'wrong'}"><strong>第${a.i+1}题：${a.correct?'✅ 正确':'❌ 错误'}</strong></div><div>你的答案：${a.u||'未作答'} · 正确答案：${a.a}</div><div style="margin-top:8px;color:#ccc;">📖 ${questions[a.i].explanation}</div></div>`).join('');
    }
    renderQuiz();
    </script>
</body>
</html>
