<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI知识小测验 2026-03-28</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: white; }
        h1 { text-align: center; color: #667eea; font-size: 2em; margin-bottom: 10px; }
        .nav { text-align: center; margin-bottom: 15px; }
        .nav a { color: #667eea; text-decoration: none; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        .quiz-container { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .question-num { color: #ff9800; font-weight: bold; margin-bottom: 10px; }
        .question { font-size: 1.1em; margin-bottom: 15px; line-height: 1.6; }
        .options label { display: block; padding: 12px 15px; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 10px; cursor: pointer; }
        .options input { margin-right: 10px; }
        .btn { display: block; width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 1.1em; cursor: pointer; margin-top: 20px; }
        .result { display: none; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; margin-top: 30px; text-align: center; }
        .score { font-size: 3em; color: #ff9800; margin-bottom: 20px; }
        .analysis { display: none; margin-top: 30px; }
        .analysis-item { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .correct { color: #4caf50; }
        .wrong { color: #f44336; }
    </style>
</head>
<body>
    <div class="nav"><a href="/archive.html">← 返回专栏</a></div>
    <h1>🧠 AI知识小测验</h1>
    <p class="subtitle">2026-03-28 · 10道题测测你对AI的了解</p>
    <div id="quiz">
        <div class="quiz-container" id="q-container"></div>
        <button class="btn" onclick="submitQuiz()">提交答案</button>
    </div>
    <div class="result" id="result">
        <div class="score" id="score"></div>
        <p id="score-text"></p>
        <button class="btn" onclick="showAnalysis()">查看解析</button>
    </div>
    <div class="analysis" id="analysis"></div>
    <script>
    const questions = [{"question": "以下关于Transformer架构的说法，哪一项是正确的？", "options": ["A. Transformer使用循环神经网络(RNN)来处理序列数据", "B. Transformer的核心机制是自注意力机制(Self-Attention)", "C. Transformer只能用于处理文本，不能处理图像", "D. Transformer不需要位置编码(Position Encoding)"], "answer": "B", "explanation": "Transformer架构由Vaswani等人于2017年提出，其核心创新是自注意力机制(Self-Attention)，它允许模型同时关注序列中的所有位置，而不是像RNN那样顺序处理。Transformer确实需要位置编码来引入序列顺序信息，且已被广泛应用于多模态任务(如Vision Transformer处理图像)。"}, {"question": "以下哪个不是大语言模型(LLM)训练过程中的主要阶段？", "options": ["A. 预训练(Pre-training)", "B. 有监督微调(Supervised Fine-tuning)", "C. 人类反馈强化学习(RLHF)", "D. 随机梯度下降(SGD)优化"], "answer": "D", "explanation": "大语言模型的训练主要包含三个阶段：1)预训练，在大规模无标注数据上学习语言模型；2)有监督微调(SFT)，在标注数据上微调模型；3)人类反馈强化学习(RLHF)，通过人类反馈进一步优化模型。随机梯度下降(SGD)是优化算法，贯穿于整个训练过程，但不是一个独立的训练阶段。"}, {"question": "OpenAI的GPT-4模型属于以下哪一类？", "options": ["A. 多模态大语言模型", "B. 仅文本生成的纯语言模型", "C. 图像生成模型", "D. 语音识别模型"], "answer": "A", "explanation": "GPT-4是OpenAI于2023年发布的多模态大语言模型，它能够接受图像和文本输入并产生文本输出。与GPT-3.5仅支持文本不同，GPT-4具备理解图像内容的能力，因此属于多模态模型。GPT-4在各种专业和学术基准测试中表现出人类水平的性能。"}, {"question": "Anthropic公司开发的AI助手叫什么名字？", "options": ["A. ChatGPT", "B. Claude", "C. Gemini", "D. Bard"], "answer": "B", "explanation": "Anthropic是一家AI安全和研究公司，其开发的AI助手叫做Claude。Claude以安全、可解释和有益的AI系统为设计目标。ChatGPT是OpenAI开发的，Gemini是Google DeepMind开发的，Bard是Google开发的(现更名为Gemini)。"}, {"question": "以下关于深度学习(Deep Learning)的描述，哪一项是错误的？", "options": ["A. 深度学习是机器学习的一个子领域", "B. 深度学习使用多层神经网络进行特征学习", "C. 深度学习不需要大量数据就能取得好效果", "D. 深度学习在计算机视觉和自然语言处理领域取得突破"], "answer": "C", "explanation": "深度学习确实需要大量标注或未标注的数据来训练大型神经网络，这是其重要特点之一。大规模数据配合大规模计算资源是深度学习成功的关键因素。选项A、B、D都是关于深度学习正确的描述。深度学习是机器学习的子领域，使用多层神经网络，能够自动学习层次化特征，并在多个领域取得突破。"}, {"question": "以下哪个AI应用场景最能体现大语言模型的对话理解能力？", "options": ["A. 图像分类", "B. 语音识别", "C. 智能客服对话系统", "D. 自动驾驶感知"], "answer": "C", "explanation": "智能客服对话系统是大语言模型最典型的应用场景之一，它需要模型理解用户的问题意图，进行多轮对话，提供有针对性的回答。图像分类属于计算机视觉任务，语音识别是将语音转为文本，自动驾驶感知主要涉及传感器数据处理，这些都不直接体现LLM的对话理解能力。"}, {"question": "在模型推理(Inference)阶段，以下哪种方法可以减少内存占用？", "options": ["A. 增加批量大小(Batch Size)", "B. 使用模型量化(Quantization)", "C. 增加模型层数", "D. 使用更多GPU并行"], "answer": "B", "explanation": "模型量化(Quantization)是一种减少模型大小和内存占用的技术，它通过将模型参数从高精度(如32位浮点数)转换为低精度(如8位整数)来减少内存和计算需求。增加批量大小会增加内存使用；增加模型层数会显著增加内存；使用更多GPU是增加计算资源而非减少内存。"}, {"question": "以下关于AI伦理的说法，哪一项是正确的？", "options": ["A. AI不需要考虑伦理问题", "B. AI的偏见问题主要来自于训练数据", "C. AI可以完全替代人类决策", "D. AI监管没有必要"], "answer": "B", "explanation": "AI系统可能产生偏见，这些偏见主要来自于训练数据。如果训练数据中存在历史偏见、不平衡或歧视性内容，模型就会学习并放大这些偏见。因此，确保训练数据的多样性和代表性是AI伦理的重要课题。AI伦理涉及透明度、责任、可解释性等多个方面，AI监管也非常必要。"}, {"question": "以下哪个技术不属于大语言模型中的提示工程(Prompt Engineering)范畴？", "options": ["A. 思维链(Chain-of-Thought)提示", "B. 少样本学习(Few-shot Learning)提示", "C. 模型蒸馏(Distillation)", "D. 零样本学习(Zero-shot Learning)提示"], "answer": "C", "explanation": "模型蒸馏(Distillation)是一种模型压缩技术，它将大模型的知识迁移到小模型中，不属于提示工程范畴。提示工程是指通过设计输入提示来引导模型产生期望输出，包括：思维链提示(让模型展示推理过程)、少样本学习提示(提供少量示例)、零样本学习提示(不提供示例仅靠指令)。"}, {"question": "以下哪个公司最先发布了商用大语言模型API？", "options": ["A. Google", "B. Microsoft", "C. OpenAI", "D. Meta"], "answer": "C", "explanation": "OpenAI是最先发布商用大语言模型API的公司。2020年6月，OpenAI发布了GPT-3的API商业版本，允许开发者通过API调用模型能力。此后，OpenAI陆续发布了ChatGPT API、GPT-4 API等。Google的PaLM API、Microsoft的Azure OpenAI Service等都是后来推出的。Meta主要开源模型而非最先商用。"}];
    
    function renderQuiz() {
        const c = document.getElementById('q-container');
        c.innerHTML = questions.map((q, i) => `<div class="question-num">第${i+1}题</div><div class="question">${q.question}</div><div class="options">${q.options.map((o, j) => `<label><input type="radio" name="q${i}" value="${String.fromCharCode(65+j)}">${o}</label>`).join('')}</div>`).join('');
    }
    
    function submitQuiz() {
        let s = 0, ans = [];
        questions.forEach((q, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            const u = sel ? sel.value : null;
            if (u === q.answer) { s++; ans.push({i, correct:true, u, a:q.answer}); }
            else { ans.push({i, correct:false, u, a:q.answer}); }
        });
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('score').textContent = `${s}/10`;
        document.getElementById('score-text').textContent = s>=7 ? '太棒了！' : s>=5 ? '不错哦！' : '继续加油！';
        window.ans = ans;
    }
    
    function showAnalysis() {
        const c = document.getElementById('analysis');
        c.style.display = 'block';
        c.innerHTML = '<h2>📝 答案解析</h2>' + window.ans.map(a => `<div class="analysis-item"><div class="${a.correct?'correct':'wrong'}"><strong>第${a.i+1}题：${a.correct?'✅ 正确':'❌ 错误'}</strong></div><div>你的答案：${a.u||'未作答'} · 正确答案：${a.a}</div><div style="margin-top:8px;color:#ccc;">📖 ${questions[a.i].explanation}</div></div>`).join('');
    }
    renderQuiz();
    </script>
</body>
</html>
