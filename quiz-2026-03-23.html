<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI知识小测验 2026-03-23</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: white; }
        h1 { text-align: center; color: #667eea; font-size: 2em; margin-bottom: 10px; }
        .nav { text-align: center; margin-bottom: 15px; }
        .nav a { color: #667eea; text-decoration: none; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        .quiz-container { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .question-num { color: #ff9800; font-weight: bold; margin-bottom: 10px; }
        .question { font-size: 1.1em; margin-bottom: 15px; line-height: 1.6; }
        .options label { display: block; padding: 12px 15px; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 10px; cursor: pointer; }
        .options input { margin-right: 10px; }
        .btn { display: block; width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 1.1em; cursor: pointer; margin-top: 20px; }
        .result { display: none; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; margin-top: 30px; text-align: center; }
        .score { font-size: 3em; color: #ff9800; margin-bottom: 20px; }
        .analysis { display: none; margin-top: 30px; }
        .analysis-item { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .correct { color: #4caf50; }
        .wrong { color: #f44336; }
    </style>
</head>
<body>
    <div class="nav"><a href="/archive.html">← 返回专栏</a></div>
    <h1>🧠 AI知识小测验</h1>
    <p class="subtitle">2026-03-23 · 10道题测测你对AI的了解</p>
    <div id="quiz">
        <div class="quiz-container" id="q-container"></div>
        <button class="btn" onclick="submitQuiz()">提交答案</button>
    </div>
    <div class="result" id="result">
        <div class="score" id="score"></div>
        <p id="score-text"></p>
        <button class="btn" onclick="showAnalysis()">查看解析</button>
    </div>
    <div class="analysis" id="analysis"></div>
    <script>
    const questions = [{"question": "Transformer架构的核心创新机制是什么？", "options": ["A. 卷积操作", "B. 循环神经网络", "C. 自注意力机制", "D. 池化层"], "answer": "C", "explanation": "Transformer架构的核心创新是自注意力机制（Self-Attention），它允许模型在处理序列时关注序列中的所有其他位置，捕捉长距离依赖关系。这与传统的CNN（卷积）和RNN（循环）有本质区别，是Transformer能够高效处理长文本的关键。"}, {"question": "以下哪项不是大型语言模型（LLM）的典型特征？", "options": ["A. 基于海量文本数据进行预训练", "B. 采用自回归生成方式", "C. 必须使用监督学习一种方式训练", "D. 能够进行上下文学习"], "answer": "C", "explanation": "大型语言模型的训练采用多种技术，包括预训练（无监督学习）、微调（监督学习）、人类反馈强化学习（RLHF）等多种方式。LLM的典型特征包括：海量预训练数据、自回归生成、上下文学习能力、涌现能力等。"}, {"question": "OpenAI的GPT-4模型属于以下哪一类模型？", "options": ["A. 多模态大模型", "B. 纯文本模型", "C. 图像生成模型", "D. 语音识别模型"], "answer": "A", "explanation": "GPT-4是OpenAI发布的多模态大模型，不仅支持文本输入输出，还能处理图像输入（视觉理解）。它可以接受图像和文本提示，生成文本回答，这是相比GPT-3.5的重要升级。"}, {"question": "Anthropic公司开发的AI助手Claude基于什么架构？", "options": ["A. GPT架构", "B. BERT架构", "C. 自主研发的Transformer架构", "D. RNN架构"], "answer": "C", "explanation": "Anthropic开发了自主的Claude AI助手，基于Transformer架构但进行了独特的优化。Anthropic强调AI安全和可控性，Claude系列模型在训练中特别注重helpful、honest、harmless的原则。"}, {"question": "深度学习与传统机器学习的主要区别是什么？", "options": ["A. 深度学习不需要数据", "B. 深度学习能自动学习特征表示", "C. 深度学习只能处理图像", "D. 深度学习不需要计算资源"], "answer": "B", "explanation": "深度学习与传统机器学习的主要区别在于特征学习：传统机器学习需要人工设计特征，而深度学习能够自动从原始数据中学习层级特征表示。这使得深度学习在处理复杂数据（如图像、语音、文本）时具有显著优势。"}, {"question": "以下哪项是大型语言模型在教育领域的典型应用？", "options": ["A. 人脸识别考勤", "B. 个性化智能辅导", "C. 教室温度控制", "D. 体育动作捕捉"], "answer": "B", "explanation": "LLM在教育领域的重要应用包括个性化智能辅导、自动答疑、作业批改、学习内容生成等。人脸识别考勤、教室温度控制、体育动作捕捉分别属于计算机视觉、物联网和运动分析领域，不直接涉及LLM。"}, {"question": "在Transformer架构中，Encoder和Decoder的主要区别是什么？", "options": ["A. Encoder只能处理图像，Decoder只能处理文本", "B. Encoder使用双向注意力，Decoder使用单向注意力", "C. Encoder比Decoder更重要", "D. Encoder和Decoder功能完全相同"], "answer": "B", "explanation": "Transformer中Encoder和Decoder的关键区别在于注意力机制：Encoder使用双向自注意力，能看到完整输入序列；Decoder使用掩码自注意力，只能看到当前位置之前的输出。这使得Encoder适合理解任务（如BERT），Decoder适合生成任务（如GPT）。"}, {"question": "什么是LLM的'涌现能力'（Emergent Abilities）？", "options": ["A. 模型在训练过程中突然崩溃的现象", "B. 模型规模达到一定程度后突然出现的新能力", "C. 模型只能执行预设的固定任务", "D. 模型输出随机变化的能力"], "answer": "B", "explanation": "涌现能力是指大型语言模型在参数规模超过某个临界点后，突然展现出在小模型中不存在的能力，如推理能力、代码编写、跨任务泛化等。这种现象在小规模模型中不明显，但在超大模型中突然出现，被称为'涌现'或'突现'。"}, {"question": "AI对齐（AI Alignment）主要关注什么问题？", "options": ["A. 如何让AI更快地运行", "B. 如何让AI系统的行为符合人类意图和价值观", "C. 如何提高AI的参数量", "D. 如何降低AI的硬件成本"], "answer": "B", "explanation": "AI对齐研究如何确保人工智能系统的行为符合人类的意图、价值观和利益。这是一个关键的安全研究领域，因为如果AI系统追求的目标与人类真实利益不一致，可能带来风险。对齐研究包括可解释性、可控性、价值学习等方面。"}, {"question": "提示工程（Prompt Engineering）的主要目的是什么？", "options": ["A. 设计更快的计算机硬件", "B. 优化输入提示以获得更好的模型输出", "C. 减少模型的参数数量", "D. 加快模型的训练速度"], "answer": "B", "explanation": "提示工程是优化输入提示（prompt）以获得更好模型输出的实践技巧。通过精心设计提示词的结构、内容和格式，可以显著提升LLM的输出质量、减少错误响应。常见的提示工程技术包括Few-shot学习、思维链推理、角色扮演等。"}];
    
    function renderQuiz() {
        const c = document.getElementById('q-container');
        c.innerHTML = questions.map((q, i) => `<div class="question-num">第${i+1}题</div><div class="question">${q.question}</div><div class="options">${q.options.map((o, j) => `<label><input type="radio" name="q${i}" value="${String.fromCharCode(65+j)}">${o}</label>`).join('')}</div>`).join('');
    }
    
    function submitQuiz() {
        let s = 0, ans = [];
        questions.forEach((q, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            const u = sel ? sel.value : null;
            if (u === q.answer) { s++; ans.push({i, correct:true, u, a:q.answer}); }
            else { ans.push({i, correct:false, u, a:q.answer}); }
        });
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('score').textContent = `${s}/10`;
        document.getElementById('score-text').textContent = s>=7 ? '太棒了！' : s>=5 ? '不错哦！' : '继续加油！';
        window.ans = ans;
    }
    
    function showAnalysis() {
        const c = document.getElementById('analysis');
        c.style.display = 'block';
        c.innerHTML = '<h2>📝 答案解析</h2>' + window.ans.map(a => `<div class="analysis-item"><div class="${a.correct?'correct':'wrong'}"><strong>第${a.i+1}题：${a.correct?'✅ 正确':'❌ 错误'}</strong></div><div>你的答案：${a.u||'未作答'} · 正确答案：${a.a}</div><div style="margin-top:8px;color:#ccc;">📖 ${questions[a.i].explanation}</div></div>`).join('');
    }
    renderQuiz();
    </script>
</body>
</html>
