<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI知识小测验 2026-03-12</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: white; }
        h1 { text-align: center; color: #667eea; font-size: 2em; margin-bottom: 10px; }
        .nav { text-align: center; margin-bottom: 15px; }
        .nav a { color: #667eea; text-decoration: none; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        .quiz-container { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .question-num { color: #ff9800; font-weight: bold; margin-bottom: 10px; }
        .question { font-size: 1.1em; margin-bottom: 15px; line-height: 1.6; }
        .options label { display: block; padding: 12px 15px; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 10px; cursor: pointer; }
        .options input { margin-right: 10px; }
        .btn { display: block; width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 1.1em; cursor: pointer; margin-top: 20px; }
        .result { display: none; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; margin-top: 30px; text-align: center; }
        .score { font-size: 3em; color: #ff9800; margin-bottom: 20px; }
        .analysis { display: none; margin-top: 30px; }
        .analysis-item { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .correct { color: #4caf50; }
        .wrong { color: #f44336; }
    </style>
</head>
<body>
    <div class="nav"><a href="/archive.html">← 返回专栏</a></div>
    <h1>🧠 AI知识小测验</h1>
    <p class="subtitle">2026-03-12 · 10道题测测你对AI的了解</p>
    <div id="quiz">
        <div class="quiz-container" id="q-container"></div>
        <button class="btn" onclick="submitQuiz()">提交答案</button>
    </div>
    <div class="result" id="result">
        <div class="score" id="score"></div>
        <p id="score-text"></p>
        <button class="btn" onclick="showAnalysis()">查看解析</button>
    </div>
    <div class="analysis" id="analysis"></div>
    <script>
    const questions = [{"question": "Transformer架构中，哪个核心组件使得模型能够并行处理序列中的所有位置，从而显著提升训练效率？", "options": ["A. 自注意力机制", "B. 循环神经网络层", "C. 卷积神经网络层", "D. 长短期记忆单元"], "answer": "A", "explanation": "Transformer架构的核心创新是自注意力机制。它允许模型在处理序列中的每个词元时，同时关注序列中所有其他词元的信息，从而实现了高度的并行计算。相比之下，RNN、LSTM等循环结构需要按顺序处理序列，难以并行化，训练效率较低。"}, {"question": "以下哪一项是大型语言模型预训练阶段最主要的任务目标？", "options": ["A. 根据指令生成特定格式的回复", "B. 预测被掩盖的词或下一个词", "C. 根据人类反馈进行排序学习", "D. 进行多轮对话的上下文管理"], "answer": "B", "explanation": "预训练是LLM从海量无标注文本数据中学习通用语言知识和世界知识的核心阶段。其主要任务通常是自监督学习目标，如掩码语言建模（预测被掩盖的词）或自回归语言建模（预测下一个词）。指令微调、RLHF和多轮对话管理通常是后续的微调或对齐阶段的任务。"}, {"question": "OpenAI的GPT-4模型相较于之前的版本，一个关键的技术突破或特点是？", "options": ["A. 首次引入Transformer架构", "B. 是一个纯文本模型，不支持多模态", "C. 是一个大型多模态模型，能接受图像和文本输入", "D. 其模型架构和训练细节已完全开源"], "answer": "C", "explanation": "GPT-4是OpenAI推出的一个大型多模态模型，可以接受图像和文本作为输入，并生成文本输出。这是其相对于GPT-3等前代纯文本模型的一个重要演进。Transformer架构由Google在2017年提出，GPT系列自初代即基于此。GPT-4的模型权重、架构细节和训练数据并未开源。"}, {"question": "Anthropic公司在其Claude模型中，为了提升模型的有用性、诚实性和无害性，主要倡导并应用了哪种对齐方法？", "options": ["A. 宪法人工智能", "B. 对抗性训练", "C. 知识蒸馏", "D. 零样本学习"], "answer": "A", "explanation": "Anthropic提出了“宪法人工智能”方法。这种方法不是直接依赖人类对模型输出的偏好反馈，而是让模型根据一套成文的“宪法”原则（如无害、有帮助、尊重隐私等）进行自我批评和修订。通过基于原则的自动反馈，CAI旨在规模化地实现模型的对齐。"}, {"question": "在深度学习模型中，为了防止过拟合，以下哪种技术不是直接在训练阶段对模型参数更新过程进行干预的？", "options": ["A. Dropout", "B. 权重衰减", "C. 早停法", "D. 数据增强"], "answer": "C", "explanation": "早停法是一种正则化技术，但它不是通过修改损失函数或网络结构来干预参数更新过程。它通过监控验证集性能，在性能不再提升时停止训练，从而防止过拟合。Dropout在训练中随机丢弃神经元，权重衰减在损失函数中添加L2正则项，数据增强通过变换输入数据增加多样性，它们都直接影响了训练过程中的参数学习。"}, {"question": "大语言模型中的“幻觉”现象主要指什么？", "options": ["A. 模型运行速度过慢，像在做梦", "B. 模型生成内容包含事实性错误或捏造信息", "C. 模型无法理解复杂的指令", "D. 模型对某些特定群体存在偏见"], "answer": "B", "explanation": "LLM的“幻觉”是指模型生成的内容在语法上流畅、看似合理，但事实上不正确或无法被可靠来源证实，甚至完全是捏造的信息。这是当前LLM面临的核心挑战之一，源于其本质上是基于统计模式生成文本，而非访问确凿的事实数据库。"}, {"question": "以下哪项技术主要用于缩小大语言模型的体积和计算需求，以便在资源受限的设备上部署？", "options": ["A. 监督微调", "B. 提示工程", "C. 模型蒸馏", "D. 预训练"], "answer": "C", "explanation": "模型蒸馏是一种模型压缩技术，其核心思想是训练一个较小的“学生模型”来模仿一个更大的、性能更强的“教师模型”的行为（如输出概率分布）。这可以在显著减小模型参数和计算量的同时，尽可能保留原模型的性能，适用于移动端或边缘设备的部署。"}, {"question": "在Transformer的解码器中，为了防止在生成任务中“看到未来信息”，使用了什么机制？", "options": ["A. 编码器-解码器注意力", "B. 双向自注意力", "C. 因果掩码", "D. 层归一化"], "answer": "C", "explanation": "在Transformer的解码器自注意力层中，使用了因果掩码（也称为前瞻掩码）。它将注意力矩阵中当前位置之后的所有位置都掩码掉（设置为负无穷，经Softmax后变为0），从而确保在生成第i个词元时，模型只能依赖于1到i-1位置的词元，符合自回归生成的特性。"}, {"question": "“思维链”提示技术主要旨在提升大语言模型在哪类任务上的表现？", "options": ["A. 创意写作", "B. 多轮对话", "C. 复杂推理", "D. 文本摘要"], "answer": "C", "explanation": "思维链是一种提示技术，它要求或引导模型在给出最终答案之前，先输出一系列中间推理步骤。通过将复杂的多步推理问题分解为循序渐进的子步骤，CoT显著提升了LLM在算术、常识、符号推理等需要逻辑思考的任务上的性能。"}, {"question": "以下关于AI代理的叙述，哪一项最准确？", "options": ["A. 它是一个静态的知识库系统", "B. 它能够感知环境、做出决策并执行行动以实现目标", "C. 它特指具有物理形态的机器人", "D. 它只能用于处理文本任务，不能使用工具"], "answer": "B", "explanation": "AI代理的核心定义是一个能够感知其环境、自主做出决策并采取行动以实现特定目标的系统。在现代语境下，基于LLM的代理通常可以理解复杂指令、规划任务步骤、调用外部工具（如搜索引擎、计算器、API）并迭代执行，最终完成目标。它不限于物理形态，也不仅仅是静态知识库。"}];
    
    function renderQuiz() {
        const c = document.getElementById('q-container');
        c.innerHTML = questions.map((q, i) => `<div class="question-num">第${i+1}题</div><div class="question">${q.question}</div><div class="options">${q.options.map((o, j) => `<label><input type="radio" name="q${i}" value="${String.fromCharCode(65+j)}">${o}</label>`).join('')}</div>`).join('');
    }
    
    function submitQuiz() {
        let s = 0, ans = [];
        questions.forEach((q, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            const u = sel ? sel.value : null;
            if (u === q.answer) { s++; ans.push({i, correct:true, u, a:q.answer}); }
            else { ans.push({i, correct:false, u, a:q.answer}); }
        });
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('score').textContent = `${s}/10`;
        document.getElementById('score-text').textContent = s>=7 ? '太棒了！' : s>=5 ? '不错哦！' : '继续加油！';
        window.ans = ans;
    }
    
    function showAnalysis() {
        const c = document.getElementById('analysis');
        c.style.display = 'block';
        c.innerHTML = '<h2>📝 答案解析</h2>' + window.ans.map(a => `<div class="analysis-item"><div class="${a.correct?'correct':'wrong'}"><strong>第${a.i+1}题：${a.correct?'✅ 正确':'❌ 错误'}</strong></div><div>你的答案：${a.u||'未作答'} · 正确答案：${a.a}</div><div style="margin-top:8px;color:#ccc;">📖 ${questions[a.i].explanation}</div></div>`).join('');
    }
    renderQuiz();
    </script>
</body>
</html>
