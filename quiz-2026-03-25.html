<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI知识小测验 2026-03-25</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: white; }
        h1 { text-align: center; color: #667eea; font-size: 2em; margin-bottom: 10px; }
        .nav { text-align: center; margin-bottom: 15px; }
        .nav a { color: #667eea; text-decoration: none; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        .quiz-container { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .question-num { color: #ff9800; font-weight: bold; margin-bottom: 10px; }
        .question { font-size: 1.1em; margin-bottom: 15px; line-height: 1.6; }
        .options label { display: block; padding: 12px 15px; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 10px; cursor: pointer; }
        .options input { margin-right: 10px; }
        .btn { display: block; width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 1.1em; cursor: pointer; margin-top: 20px; }
        .result { display: none; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; margin-top: 30px; text-align: center; }
        .score { font-size: 3em; color: #ff9800; margin-bottom: 20px; }
        .analysis { display: none; margin-top: 30px; }
        .analysis-item { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .correct { color: #4caf50; }
        .wrong { color: #f44336; }
    </style>
</head>
<body>
    <div class="nav"><a href="/archive.html">← 返回专栏</a></div>
    <h1>🧠 AI知识小测验</h1>
    <p class="subtitle">2026-03-25 · 10道题测测你对AI的了解</p>
    <div id="quiz">
        <div class="quiz-container" id="q-container"></div>
        <button class="btn" onclick="submitQuiz()">提交答案</button>
    </div>
    <div class="result" id="result">
        <div class="score" id="score"></div>
        <p id="score-text"></p>
        <button class="btn" onclick="showAnalysis()">查看解析</button>
    </div>
    <div class="analysis" id="analysis"></div>
    <script>
    const questions = [{"question": "以下关于Transformer架构的描述，哪个是正确的？", "options": ["A. Transformer使用卷积神经网络(CNN)来处理序列数据", "B. Transformer的核心机制是自注意力(Self-Attention)", "C. Transformer只能处理固定长度的输入序列", "D. Transformer不需要任何位置编码"], "answer": "B", "explanation": "Transformer架构的核心创新在于自注意力机制，它允许模型同时关注输入序列中的所有位置，捕获长距离依赖关系。Transformer使用位置编码来表达序列顺序信息，可以处理变长输入，但通常有最大序列长度限制。"}, {"question": "大型语言模型(LLM)的训练过程通常不包括以下哪个阶段？", "options": ["A. 预训练(Pre-training)", "B. 有监督微调(Supervised Fine-tuning)", "C. 强化学习从人类反馈学习(RLHF)", "D. 蒸馏(Distillation)"], "answer": "D", "explanation": "LLM的标准训练流程包括：1)预训练在大规模文本上学习语言模式；2)有监督微调提高指令遵循能力；3)RLHF进一步对齐人类偏好。蒸馏是模型压缩技术，通常不是LLM训练的必要阶段，而是用于部署优化。"}, {"question": "OpenAI的GPT-4模型属于以下哪一类？", "options": ["A. 多模态大语言模型", "B. 纯文本生成模型", "C. 图像生成模型", "D. 语音识别模型"], "answer": "A", "explanation": "GPT-4是OpenAI发布的多模态大语言模型，不仅能处理文本输入输出，还支持图像理解能力。用户可以输入图像，GPT-4能够分析图像内容并回答相关问题，这是其与GPT-3.5的重要区别。"}, {"question": "Anthropic公司推出的Claude系列模型，其设计理念主要强调什么？", "options": ["A. 追求最大模型参数规模", "B. 强调模型的安全性和有用性(Constitutional AI)", "C. 专注于图像生成能力", "D. 强调模型的推理速度"], "answer": "B", "explanation": "Anthropic在Claude模型中引入了Constitutional AI(宪法AI)理念，强调模型应该是有帮助、无害且诚实的。Claude系列通过AI反馈强化学习(RLAIF)和人类反馈结合，致力于提供更安全、更对齐的AI助手。"}, {"question": "深度学习与传统机器学习最主要的区别是什么？", "options": ["A. 深度学习不需要大量数据", "B. 深度学习能自动学习特征表示", "C. 深度学习只能用于分类任务", "D. 深度学习不需要计算资源"], "answer": "B", "explanation": "深度学习的主要优势在于能够自动从原始数据中学习层次化的特征表示，无需人工设计特征。而传统机器学习通常需要人工进行特征工程。深度学习需要大量数据和计算资源，可用于分类、回归、生成等多种任务。"}, {"question": "以下哪项不是大语言模型在企业中的典型应用场景？", "options": ["A. 智能客服对话系统", "B. 代码辅助生成", "C. 医疗诊断替代医生", "D. 文档摘要与生成"], "answer": "C", "explanation": "LLM在企业中有众多应用，如智能客服、代码生成、文档处理等。但医疗诊断是一个高风险领域，LLM目前只能作为辅助工具提供信息参考，不能替代专业医生的诊断和诊疗。各国监管机构都明确要求AI辅助诊断需要人类医生最终决策。"}, {"question": "在LLM推理时，什么技术可以用来减少显存占用同时保持输出质量？", "options": ["A. 量化(Quantization)", "B. 数据增强", "C. 梯度下降", "D. 批量归一化"], "answer": "A", "explanation": "量化是一种模型压缩技术，将模型参数从高精度(如FP32)转换为低精度(如INT8)表示，可以显著减少显存占用和计算量，同时保持相对较好的输出质量。量化推理特别适合在大容量GPU或消费级硬件上部署大模型。"}, {"question": "以下哪个评估指标通常用于衡量LLM在多项选择题上的表现？", "options": ["A. BLEU", "B. ROUGE", "C. MMLU", "D. FID"], "answer": "C", "explanation": "MMLU(Massive Multitask Language Understanding)是一个综合基准测试，包含57个学科的多项选择题，用于评估模型的广泛知识和推理能力。BLEU和ROUGE主要用于评估机器翻译和文本摘要，FID(Frechet Inception Distance)用于评估图像生成质量。"}, {"question": "关于AI幻觉(Hallucination)问题，以下描述正确的是？", "options": ["A. 幻觉问题已被完全解决", "B. 幻觉是指模型生成看似合理但实际错误的内容", "C. 只有GPT模型会产生幻觉", "D. 增大模型参数可以消除幻觉"], "answer": "B", "explanation": "AI幻觉是指大语言模型生成看似流畅合理但实际包含事实错误或虚构信息的内容。这是当前LLM面临的重大挑战之一，各种规模的模型都可能产生幻觉。通过RAG检索增强、事实核查等方法可以缓解但无法完全消除。"}, {"question": "2024年AI领域的重要发展趋势不包括以下哪项？", "options": ["A. 多模态AI模型的快速发展", "B. AI Agent(AI智能体)的兴起", "C. 完全放弃语言模型转向传统规则系统", "D. 开源大模型的蓬勃发展"], "answer": "C", "explanation": "2024年AI发展的主要趋势包括：多模态模型(如GPT-4V、Gemini)能够处理文本、图像、视频等；AI Agent让AI能够自主规划和执行任务；开源模型(如LLaMA、Qwen)蓬勃发展。完全放弃语言模型转向传统规则系统并非发展趋势，语言模型仍是AI能力的核心。"}];
    
    function renderQuiz() {
        const c = document.getElementById('q-container');
        c.innerHTML = questions.map((q, i) => `<div class="question-num">第${i+1}题</div><div class="question">${q.question}</div><div class="options">${q.options.map((o, j) => `<label><input type="radio" name="q${i}" value="${String.fromCharCode(65+j)}">${o}</label>`).join('')}</div>`).join('');
    }
    
    function submitQuiz() {
        let s = 0, ans = [];
        questions.forEach((q, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            const u = sel ? sel.value : null;
            if (u === q.answer) { s++; ans.push({i, correct:true, u, a:q.answer}); }
            else { ans.push({i, correct:false, u, a:q.answer}); }
        });
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('score').textContent = `${s}/10`;
        document.getElementById('score-text').textContent = s>=7 ? '太棒了！' : s>=5 ? '不错哦！' : '继续加油！';
        window.ans = ans;
    }
    
    function showAnalysis() {
        const c = document.getElementById('analysis');
        c.style.display = 'block';
        c.innerHTML = '<h2>📝 答案解析</h2>' + window.ans.map(a => `<div class="analysis-item"><div class="${a.correct?'correct':'wrong'}"><strong>第${a.i+1}题：${a.correct?'✅ 正确':'❌ 错误'}</strong></div><div>你的答案：${a.u||'未作答'} · 正确答案：${a.a}</div><div style="margin-top:8px;color:#ccc;">📖 ${questions[a.i].explanation}</div></div>`).join('');
    }
    renderQuiz();
    </script>
</body>
</html>
