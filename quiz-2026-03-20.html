<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI知识小测验 2026-03-20</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: white; }
        h1 { text-align: center; color: #667eea; font-size: 2em; margin-bottom: 10px; }
        .nav { text-align: center; margin-bottom: 15px; }
        .nav a { color: #667eea; text-decoration: none; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        .quiz-container { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .question-num { color: #ff9800; font-weight: bold; margin-bottom: 10px; }
        .question { font-size: 1.1em; margin-bottom: 15px; line-height: 1.6; }
        .options label { display: block; padding: 12px 15px; margin: 8px 0; background: rgba(255,255,255,0.05); border-radius: 10px; cursor: pointer; }
        .options input { margin-right: 10px; }
        .btn { display: block; width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 1.1em; cursor: pointer; margin-top: 20px; }
        .result { display: none; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; margin-top: 30px; text-align: center; }
        .score { font-size: 3em; color: #ff9800; margin-bottom: 20px; }
        .analysis { display: none; margin-top: 30px; }
        .analysis-item { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .correct { color: #4caf50; }
        .wrong { color: #f44336; }
    </style>
</head>
<body>
    <div class="nav"><a href="/archive.html">← 返回专栏</a></div>
    <h1>🧠 AI知识小测验</h1>
    <p class="subtitle">2026-03-20 · 10道题测测你对AI的了解</p>
    <div id="quiz">
        <div class="quiz-container" id="q-container"></div>
        <button class="btn" onclick="submitQuiz()">提交答案</button>
    </div>
    <div class="result" id="result">
        <div class="score" id="score"></div>
        <p id="score-text"></p>
        <button class="btn" onclick="showAnalysis()">查看解析</button>
    </div>
    <div class="analysis" id="analysis"></div>
    <script>
    const questions = [{"question": "以下关于Transformer架构的描述，哪个是错误的？", "options": ["A. Transformer使用自注意力机制来处理序列数据", "B. Transformer完全摒弃了循环神经网络的结构", "C. Transformer只能用于自然语言处理任务", "D. Transformer的编码器和解码器都由多头注意力组成"], "answer": "C", "explanation": "Transformer最初是为了机器翻译任务设计的，但它不仅限于NLP任务。目前Transformer已被广泛应用于计算机视觉（如Vision Transformer）、音频处理、蛋白质结构预测等多个领域，因此C选项是错误的。A选项正确，Transformer确实使用自注意力机制；B选项正确，Transformer完全基于注意力机制，不使用循环结构；D选项正确，Transformer编码器和解码器都由多头自注意力和前馈网络组成。"}, {"question": "GPT系列模型的核心技术原理是什么？", "options": ["A. 编码器-解码器架构", "B. 仅解码器（Decoder-only）的Transformer", "C. 仅编码器（Encoder-only）的Transformer", "D. 卷积神经网络"], "answer": "B", "explanation": "GPT系列采用的是仅解码器（Decoder-only）的Transformer架构。这种架构的特点是使用单向（从左到右）的自注意力机制，适合于生成任务。BERT使用的是仅编码器架构，而原始的Transformer使用的是编码器-解码器架构。GPT通过大规模无监督预训练+有监督微调的方式进行学习。"}, {"question": "OpenAI的ChatGPT首次公开发布是在哪一年？", "options": ["A. 2020年", "B. 2021年", "C. 2022年", "D. 2023年"], "answer": "C", "explanation": "ChatGPT于2022年11月30日由OpenAI正式发布。发布后5天内用户数量就突破100万，成为历史上增长最快的消费级应用。ChatGPT基于GPT-3.5模型，后来在2023年升级到GPT-4模型。2020年OpenAI发布了GPT-3，2021年发布了GPT-3.5的API。"}, {"question": "Anthropic公司开发的Claude模型主打的安全特性是什么？", "options": ["A. 更大的模型参数", "B. 宪法AI（Constitutional AI）", "C. 更快的推理速度", "D. 多模态能力"], "answer": "B", "explanation": "Anthropic在Claude模型中引入了宪法AI（Constitutional AI）的概念，这是一种通过制定一套原则或规则来指导AI行为的方法。宪法AI的目标是使AI系统更加无害、诚实和有帮助，通过内置的行为准则来约束模型的输出。这与传统的基于人类反馈的强化学习（RLHF）有所不同，旨在从源头提高AI的安全性。"}, {"question": "以下哪项不是大语言模型（LLM）典型的基础应用场景？", "options": ["A. 文本生成与创作", "B. 代码编写与调试", "C. 图像识别与分类", "D. 问答与对话系统"], "answer": "C", "explanation": "图像识别与分类是计算机视觉（CV）领域的任务，不是大语言模型的基础应用场景。虽然现在出现了多模态大模型（如GPT-4V、Claude 3等），可以处理图像，但纯文本的LLM不直接用于图像识别。LLM的基础应用场景主要包括：文本生成、代码编写、问答对话、翻译、摘要、情感分析等。A、B、D都是LLM的典型应用场景。"}, {"question": "在深度学习中，'过拟合'指的是什么？", "options": ["A. 模型在训练数据上表现不好", "B. 模型在测试数据上表现不好", "C. 模型在训练数据上表现太好，但在新数据上表现差", "D. 模型参数太少导致无法学习"], "answer": "C", "explanation": "过拟合是指模型在训练数据上表现非常好（甚至能完美记住训练数据），但在新数据（测试数据）上表现较差的现象。这说明模型过度学习了训练数据中的噪声和细节，而没有学到真正的通用模式。过拟合的相反情况是欠拟合，即模型在训练数据上表现就不好。解决过拟合的方法包括：增加数据量、正则化、dropout、早停等。"}, {"question": "以下哪种技术可以提高大语言模型的推理效果？", "options": ["A. 提示工程（Prompt Engineering）", "B. 模型蒸馏", "C. 随机梯度下降", "D. 批量归一化"], "answer": "A", "explanation": "提示工程（Prompt Engineering）是通过精心设计输入提示来引导LLM产生更好输出的技术，包括Few-shot学习、思维链（Chain-of-Thought）提示、角色扮演等方法。模型蒸馏是一种模型压缩技术；随机梯度下降是模型训练时的优化算法；批量归一化是神经网络中的规范化技术，用于提高训练稳定性。因此，只有A选项是直接用于提高推理效果的技术。"}, {"question": "以下哪个不是AI伦理研究中关注的主要问题？", "options": ["A. 算法偏见与歧视", "B. 隐私保护", "C. 模型参数数量", "D. AI决策透明度"], "answer": "C", "explanation": "模型参数数量是技术层面的指标，不属于AI伦理研究的范畴。AI伦理主要关注的问题包括：算法偏见与歧视（可能导致对特定群体的不公平对待）、隐私保护（AI系统如何处理用户数据）、AI决策透明度（可解释性）、AI安全与可控性、责任归属等。因此，C选项是正确答案。"}, {"question": "大语言模型的训练过程通常包含哪两个主要阶段？", "options": ["A. 预训练和后训练", "B. 预训练和微调", "C. 监督学习和无监督学习", "D. 训练和推理"], "答案": "B", "explanation": "大语言模型的训练通常分为两个主要阶段：预训练（Pre-training）和微调（Fine-tuning）。预训练阶段使用大规模无标注数据学习语言知识和世界知识；微调阶段使用标注数据或人类反馈进行任务适配。RLHF（基于人类反馈的强化学习）是微调的一种重要方法。A选项的'后训练'不是标准术语；C选项不准确；D选项的推理不是训练阶段。"}, {"question": "以下哪个是当前大语言模型面临的主要挑战之一？", "options": ["A. 计算资源不足", "B. 幻觉问题（Hallucination）", "C. 无法处理长文本", "D. 模型太小"], "answer": "B", "explanation": "幻觉问题是指LLM生成看似合理但实际错误或虚假信息的问题，这是当前LLM面临的主要挑战之一。幻觉问题会严重影响LLM在需要准确信息场景中的应用，如医疗、法律、金融等。虽然A选项（计算资源）和C选项（长文本处理）也是挑战，但它们更多是工程问题。幻觉是本质性的、能力层面的问题。模型太小不是挑战，因为已有超大参数模型。"}];
    
    function renderQuiz() {
        const c = document.getElementById('q-container');
        c.innerHTML = questions.map((q, i) => `<div class="question-num">第${i+1}题</div><div class="question">${q.question}</div><div class="options">${q.options.map((o, j) => `<label><input type="radio" name="q${i}" value="${String.fromCharCode(65+j)}">${o}</label>`).join('')}</div>`).join('');
    }
    
    function submitQuiz() {
        let s = 0, ans = [];
        questions.forEach((q, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            const u = sel ? sel.value : null;
            if (u === q.answer) { s++; ans.push({i, correct:true, u, a:q.answer}); }
            else { ans.push({i, correct:false, u, a:q.answer}); }
        });
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('score').textContent = `${s}/10`;
        document.getElementById('score-text').textContent = s>=7 ? '太棒了！' : s>=5 ? '不错哦！' : '继续加油！';
        window.ans = ans;
    }
    
    function showAnalysis() {
        const c = document.getElementById('analysis');
        c.style.display = 'block';
        c.innerHTML = '<h2>📝 答案解析</h2>' + window.ans.map(a => `<div class="analysis-item"><div class="${a.correct?'correct':'wrong'}"><strong>第${a.i+1}题：${a.correct?'✅ 正确':'❌ 错误'}</strong></div><div>你的答案：${a.u||'未作答'} · 正确答案：${a.a}</div><div style="margin-top:8px;color:#ccc;">📖 ${questions[a.i].explanation}</div></div>`).join('');
    }
    renderQuiz();
    </script>
</body>
</html>
